<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Bot Test Form</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 24px; }
    .card { max-width: 740px; padding: 18px; border: 1px solid #ddd; border-radius: 10px; }
    label { display: block; margin-top: 10px; font-weight: 600; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 6px; }
    .row { margin-top: 14px; }
    button { padding: 10px 14px; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Easy Apply - Test Role</h1>
    <p>Company: Demo Labs</p>
    <p>Location: Remote</p>

    <div class="row">
      <button type="button">Easy Apply</button>
      <button type="button">Apply Now</button>
    </div>

    <label for="full_name">Full Name</label>
    <input id="full_name" name="full_name" type="text" required />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />

    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="tel" />

    <label for="location">Location</label>
    <input id="location" name="location" type="text" />

    <label for="linkedin">LinkedIn</label>
    <input id="linkedin" name="linkedin" type="url" />

    <label for="resume">Upload Resume</label>
    <input id="resume" name="resume" type="file" />

    <label for="work_auth">Work Authorization</label>
    <select id="work_auth" name="work_auth">
      <option value="">Select...</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <label for="cover_letter">Cover Letter</label>
    <textarea id="cover_letter" name="cover_letter" rows="6"></textarea>

    <div class="row">
      <button type="button">Review</button>
      <button type="submit">Submit Application</button>
    </div>
  </div>
</body>
</html>
